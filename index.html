<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>営業訪問チェックリスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f5f5f3;color:#1a1a1a;display:flex;flex-direction:column;}

/* ── TAB BAR ── */
#tab-bar{display:flex;align-items:stretch;background:#fff;border-bottom:1px solid #ddd;padding:0 8px;min-height:42px;overflow-x:auto;overflow-y:hidden;flex-shrink:0;gap:2px;}
#tab-bar::-webkit-scrollbar{height:3px;}
#tab-bar::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}
.tab{display:flex;align-items:center;gap:6px;padding:0 12px;font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;color:#888;flex-shrink:0;min-height:42px;}
.tab.active{color:#1a1a1a;border-bottom-color:#534AB7;font-weight:500;}
.tab .tab-close{font-size:14px;color:#bbb;line-height:1;padding:2px 0 2px 2px;}
.tab .tab-close:hover{color:#e55;}
#btn-add-tab{display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:20px;color:#888;cursor:pointer;flex-shrink:0;border:none;background:none;}
#btn-add-tab:hover{color:#534AB7;}

/* ── MAIN AREA ── */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex:1;overflow-y:auto;padding:10px 12px 12px;}
.panel.active{display:flex;flex-direction:column;gap:8px;}

/* ── SECTIONS ── */
.card{background:#fff;border-radius:10px;border:0.5px solid #e5e5e5;padding:8px 12px;}
.sec-label{font-size:10px;font-weight:600;color:#888;letter-spacing:0.08em;margin-bottom:5px;text-transform:uppercase;}

/* ── FIELD ROWS ── */
.row{display:grid;grid-template-columns:72px 1fr;align-items:center;gap:6px;margin-bottom:4px;}
.row:last-child{margin-bottom:0;}
.row-label{font-size:12px;color:#666;}
input[type=text]{width:100%;font-size:12px;padding:4px 8px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;}
input[type=text]:focus{border-color:#aaa;}

/* ── CHIP GROUPS ── */
.chip-group{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:11px;padding:3px 9px;border-radius:999px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;user-select:none;transition:background .12s,color .12s;}
.chip.on{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:500;}
.chip-break{width:100%;height:0;}

/* ── PRODUCT BOX ── */
.prod-box{background:#f5f5f3;border-radius:8px;padding:6px 10px;}
.prod-empty{font-size:11px;color:#aaa;font-style:italic;}
.prod-table{width:100%;border-collapse:collapse;font-size:11px;}
.prod-table td{padding:2px 0;vertical-align:top;}
.prod-table td:first-child{color:#888;min-width:80px;font-size:10px;}
.prod-table td:last-child{font-weight:500;color:#1a1a1a;}

/* ── TWO COLUMN LAYOUT ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── SEND BUTTON ── */
.send-btn{width:100%;padding:9px;font-size:13px;font-weight:500;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;}
.send-btn:hover{opacity:.88;}
.notice{font-size:10px;color:#aaa;margin-top:4px;text-align:center;}
</style>
</head>
<body>

<div id="tab-bar">
  <button id="btn-add-tab" title="新しい訪問を追加">＋</button>
</div>
<div id="main"></div>

<script>
const PRODUCTS={
  "集合住宅":{梁:"Top50/テーブル/SKE50plus/Dokaビーム",床:"テーブル/Dokaビーム",壁:"Top50/Framax",柱:"Framax",スラブ:"テーブル",PCa:"12k(受け)/ストラット(建入)",クイックアップ:"プロップ",片押壁:"DSW",センターコア:"SKE50plus+Top50/Xclimb"},
  "ホテル":{梁:"Top50/テーブル/SKE50plus/Dokaビーム",床:"テーブル/Dokaビーム",壁:"Top50/Framax",柱:"Framax",スラブ:"テーブル",PCa:"12k(受け)/ストラット(建入)",クイックアップ:"プロップ",片押壁:"DSW",センターコア:"SKE50plus+Top50/Xclimb"},
  "介護施設":{梁:"Top50/テーブル/SKE50plus/Dokaビーム",床:"テーブル/Dokaビーム",壁:"Top50/Framax",柱:"Framax",スラブ:"テーブル",PCa:"12k(受け)/ストラット(建入)",クイックアップ:"プロップ",片押壁:"DSW",センターコア:"SKE50plus+Top50/Xclimb"},
  "商業施設":{梁:"Dokaビーム+プロップ",柱:"Top50",片押壁:"DSW",センターコア:"SKE50plus+Top50"},
  "事務所":{梁:"Dokaビーム+プロップ",柱:"Top50",片押壁:"DSW",センターコア:"SKE50plus+Top50"},
  "物流倉庫":{梁:"Dokaビーム+プロップ",床:"テーブル",壁:"Framax",柱:"Top50/Framax",スラブ:"テーブル+12K"},
  "工場":{梁:"Dokaビーム+プロップ",床:"テーブル",壁:"Framax",柱:"Top50/Framax",スラブ:"テーブル+12K"},
  "市場":{梁:"Dokaビーム+プロップ",床:"テーブル",壁:"Framax",柱:"Top50/Framax",スラブ:"テーブル+12K"},
  "研究所":{梁:"Dokaビーム+プロップ/プロップ+OKサポート(受け)",床:"テーブル",壁:"Top50",柱:"Framax",クイックアップ:"プロップ",片押壁:"DSW"},
  "病院":{梁:"Dokaビーム+プロップ/プロップ+OKサポート(受け)",床:"テーブル",壁:"Top50",柱:"Framax",クイックアップ:"プロップ",片押壁:"DSW"},
  "学校":{梁:"Dokaビーム+プロップ/プロップ+OKサポート(受け)",床:"テーブル",壁:"Top50",柱:"Framax",クイックアップ:"プロップ",片押壁:"DSW"},
  "庁舎":{梁:"Dokaビーム+プロップ/プロップ+OKサポート(受け)",床:"テーブル",壁:"Top50",柱:"Framax",クイックアップ:"プロップ",片押壁:"DSW"},
  "水処理":{壁:"Top50/Framax",柱:"Framax",PCa:"Top50"},
  "エネ電":{壁:"Top50/Framax",柱:"Framax",PCa:"Top50"},
  "橋梁":{柱:"Top50/SKE50plus+Top50",橋脚:"SKE100/SKE50plus+Top50/Top50/Xclimb+Top50",ケーソン:"Top50",インバート:"Top50","C-BOX":"Top50"},
  "道路":{柱:"Top50/SKE50plus+Top50",橋脚:"SKE100/SKE50plus+Top50/Top50/Xclimb+Top50",ケーソン:"Top50",インバート:"Top50","C-BOX":"Top50"},
  "鉄道":{柱:"Top50/SKE50plus+Top50",橋脚:"SKE100/SKE50plus+Top50/Top50/Xclimb+Top50",ケーソン:"Top50",インバート:"Top50","C-BOX":"Top50"},
  "ダム":{堤体:"SKE50plus"},
  "立坑":{壁:"Top50/SKE50plus+メタルR型大型型枠"},
};

const YOTO_LIST=["集合住宅","商業施設","事務所","ホテル","介護施設","物流倉庫","工場","市場","研究所","病院","学校","庁舎","水処理","エネ電","橋梁","道路","鉄道","ダム","立坑"];
const YOTO_BREAKS=new Set(["物流倉庫","研究所","水処理","橋梁"]);
const KOZO_LIST=["RC","SRC","S","PCa"];
const PHASE_LIST=["業者選定段階","入札段階","計画段階"];

let tabs=[];
let activeId=null;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function genSubject(){
  const d=new Date();
  const base=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const key='vl_'+base;
  let idx=parseInt(localStorage.getItem(key)||'0');
  idx++;
  localStorage.setItem(key,String(idx));
  return base+String.fromCharCode(96+idx);
}

function save(){
  localStorage.setItem('sc_tabs',JSON.stringify(tabs));
  localStorage.setItem('sc_active',activeId||'');
}

function load(){
  try{
    const t=localStorage.getItem('sc_tabs');
    const a=localStorage.getItem('sc_active');
    if(t){tabs=JSON.parse(t);}
    if(a){activeId=a;}
  }catch(e){tabs=[];activeId=null;}
}

function newTabData(id){
  return {id,name:genSubject(),visitor:'',person:'',project:'',yoto:[],kozo:[],phase:[],period:'',place:'',scale:'',general:'',design:'',const_:'',other:''};
}

function addTab(){
  const data=newTabData(genId());
  tabs.push(data);
  activeId=data.id;
  save();
  render();
}

function removeTab(id,e){
  e.stopPropagation();
  tabs=tabs.filter(t=>t.id!==id);
  if(activeId===id){activeId=tabs.length?tabs[tabs.length-1].id:null;}
  save();
  render();
}

function switchTab(id){
  activeId=id;
  save();
  render();
}

function getTab(id){return tabs.find(t=>t.id===id);}

function buildPanel(data){
  const div=document.createElement('div');
  div.className='panel'+(data.id===activeId?' active':'');
  div.id='panel-'+data.id;

  // helper
  function field(label,key,placeholder=''){
    const row=document.createElement('div');row.className='row';
    const lbl=document.createElement('span');lbl.className='row-label';lbl.textContent=label;
    const inp=document.createElement('input');inp.type='text';inp.value=data[key]||'';inp.placeholder=placeholder;
    inp.addEventListener('input',()=>{data[key]=inp.value;save();});
    row.append(lbl,inp);return row;
  }

  // ── 基本情報
  const card1=document.createElement('div');card1.className='card';
  const l1=document.createElement('p');l1.className='sec-label';l1.textContent='基本情報';
  card1.append(l1,field('訪問先','visitor','会社名'),field('ご担当者','person','氏名'),field('PJ名','project','プロジェクト名'));

  // ── 用途(左) + 推奨製品(右) 横並び
  const yotoRow=document.createElement('div');
  yotoRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;';

  const card2=document.createElement('div');card2.className='card';
  const l2=document.createElement('p');l2.className='sec-label';l2.textContent='用途（複数選択可）';
  const cg=document.createElement('div');cg.className='chip-group';
  YOTO_LIST.forEach(v=>{
    if(YOTO_BREAKS.has(v)){const br=document.createElement('div');br.className='chip-break';cg.append(br);}
    const c=document.createElement('span');c.className='chip'+(data.yoto.includes(v)?' on':'');c.textContent=v;
    c.addEventListener('click',()=>{
      if(data.yoto.includes(v)){data.yoto=data.yoto.filter(x=>x!==v);c.classList.remove('on');}
      else{data.yoto.push(v);c.classList.add('on');}
      save();updateProducts(data,prodTable,prodEmpty);
    });
    cg.append(c);
  });
  card2.append(l2,cg);

  const cardProd=document.createElement('div');cardProd.className='card';
  const lProd=document.createElement('p');lProd.className='sec-label';lProd.textContent='推奨製品';
  const prodEmpty=document.createElement('p');prodEmpty.className='prod-empty';prodEmpty.textContent='用途を選択すると表示されます';
  const prodTable=document.createElement('table');prodTable.className='prod-table';prodTable.style.display='none';
  cardProd.append(lProd,prodEmpty,prodTable);

  yotoRow.append(card2,cardProd);
  updateProducts(data,prodTable,prodEmpty);

  // ── two-col: 構造 + フェーズ
  const twoCol=document.createElement('div');twoCol.className='two-col';

  const card3=document.createElement('div');card3.className='card';
  const l3=document.createElement('p');l3.className='sec-label';l3.textContent='構造';
  const cg3=document.createElement('div');cg3.className='chip-group';
  KOZO_LIST.forEach(v=>{
    const c=document.createElement('span');c.className='chip'+(data.kozo.includes(v)?' on':'');c.textContent=v;
    c.addEventListener('click',()=>{
      if(data.kozo.includes(v)){data.kozo=data.kozo.filter(x=>x!==v);c.classList.remove('on');}
      else{data.kozo.push(v);c.classList.add('on');}
      save();
    });
    cg3.append(c);
  });
  card3.append(l3,cg3);

  const card4=document.createElement('div');card4.className='card';
  const l4=document.createElement('p');l4.className='sec-label';l4.textContent='フェーズ';
  const cg4=document.createElement('div');cg4.className='chip-group';
  PHASE_LIST.forEach(v=>{
    const c=document.createElement('span');c.className='chip'+(data.phase.includes(v)?' on':'');c.textContent=v;
    c.style.borderRadius='6px';
    c.addEventListener('click',()=>{
      cg4.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      data.phase=[v];c.classList.add('on');save();
    });
    cg4.append(c);
  });
  card4.append(l4,cg4);
  twoCol.append(card3,card4);

  // ── 工程・規模
  const card5=document.createElement('div');card5.className='card';
  const l5=document.createElement('p');l5.className='sec-label';l5.textContent='工程・規模';
  card5.append(l5,field('全体工期','period','例：2025/04〜2027/03'),field('場所','place','都道府県・市区町村'),field('規模㎡','scale','延床面積など'));

  // ── 関係者
  const card6=document.createElement('div');card6.className='card';
  const l6=document.createElement('p');l6.className='sec-label';l6.textContent='関係者';
  card6.append(l6,field('ゼネコン','general','会社名'),field('設計会社','design','会社名'),field('施工会社','const_','会社名'),field('その他業者','other','会社名・氏名'));

  // ── send button
  const btn=document.createElement('button');btn.className='send-btn';btn.textContent='abschicken';
  const notice=document.createElement('p');notice.className='notice';
  btn.addEventListener('click',()=>{
    const yoto=data.yoto.join('、')||'(未選択)';
    const kozo=data.kozo.join('、')||'(未選択)';
    const phase=data.phase.join('、')||'(未選択)';
    const merged={};
    data.yoto.forEach(y=>{const p=PRODUCTS[y];if(!p)return;Object.entries(p).forEach(([k,v])=>{if(!merged[k])merged[k]=new Set();v.split('/').forEach(s=>merged[k].add(s.trim()));});});
    const prodLines=Object.entries(merged).map(([k,vs])=>`  ${k}: ${[...vs].join(' / ')}`).join('\n')||'  (用途未選択)';
    const body=`【営業訪問チェックリスト】\n\n■ 基本情報\n訪問先：${data.visitor}\nご担当者：${data.person}\nPJ名：${data.project}\n\n■ 用途：${yoto}\n\n■ 推奨製品\n${prodLines}\n\n■ 構造：${kozo}\n\n■ 工程・規模\n全体工期：${data.period}\n場所：${data.place}\n規模：${data.scale} ㎡\n\n■ フェーズ：${phase}\n\n■ 関係者\nゼネコン：${data.general}\n設計会社：${data.design}\n施工会社：${data.const_}\nその他業者：${data.other}`;
    window.open(`https://mail.google.com/mail/?view=cm&su=${encodeURIComponent(data.name)}&body=${encodeURIComponent(body)}`,'_blank');
    notice.textContent='件名「'+data.name+'」でGmailが開きます';
  });

  div.append(card1,yotoRow,twoCol,card5,card6,btn,notice);
  return div;
}

function updateProducts(data,table,empty){
  const merged={};
  data.yoto.forEach(y=>{const p=PRODUCTS[y];if(!p)return;Object.entries(p).forEach(([k,v])=>{if(!merged[k])merged[k]=new Set();v.split('/').forEach(s=>merged[k].add(s.trim()));});});
  if(!Object.keys(merged).length){table.style.display='none';empty.style.display='';return;}
  empty.style.display='none';table.style.display='';
  table.innerHTML=Object.entries(merged).map(([k,vs])=>`<tr><td>${k}</td><td>${[...vs].join(' / ')}</td></tr>`).join('');
}

function render(){
  // tab bar
  const bar=document.getElementById('tab-bar');
  bar.innerHTML='';
  const addBtn=document.createElement('button');addBtn.id='btn-add-tab';addBtn.textContent='＋';addBtn.title='新しい訪問を追加';
  addBtn.addEventListener('click',addTab);
  bar.append(addBtn);

  tabs.forEach(t=>{
    const tab=document.createElement('div');
    tab.className='tab'+(t.id===activeId?' active':'');
    const name=document.createElement('span');name.textContent=t.name;
    const close=document.createElement('span');close.className='tab-close';close.textContent='×';
    close.addEventListener('click',e=>removeTab(t.id,e));
    tab.append(name,close);
    tab.addEventListener('click',()=>switchTab(t.id));
    bar.append(tab);
  });

  // panels
  const main=document.getElementById('main');
  main.innerHTML='';
  if(!tabs.length){
    const msg=document.createElement('div');
    msg.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px;';
    msg.textContent='「＋」をタップして訪問を追加してください';
    main.append(msg);
  } else {
    tabs.forEach(t=>main.append(buildPanel(t)));
  }

  // scroll active tab into view
  const activeTab=bar.querySelector('.tab.active');
  if(activeTab)activeTab.scrollIntoView({block:'nearest',inline:'nearest'});
}

// init
load();
if(!tabs.length)addTab();
else render();
</script>
</body>
</html>
